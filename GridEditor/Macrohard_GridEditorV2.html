<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C3 Grid Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root {
  --bg: #111; --surface: #181818; --border: #222; --border2: #2e2e2e;
  --accent: #c8a96e; --text: #bbb; --dim: #3a3a3a; --dim2: #666;
  --danger: #aa3333; --ok: #2a7a4a; --ok-text: #4fba7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; min-height: 100vh; display: flex; flex-direction: column; }
header { padding: 8px 14px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: var(--surface); position: sticky; top: 0; z-index: 100; }
.logo { font-weight: 600; font-size: 12px; color: var(--accent); letter-spacing: 0.04em; white-space: nowrap; display: flex; align-items: center; gap: 7px; }
.logo img { height: 20px; width: auto; opacity: 0.9; }
.toolbar { display: flex; gap: 3px; flex-wrap: wrap; flex: 1; justify-content: flex-end; align-items: center; }
.btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 400; padding: 3px 9px; border: 1px solid var(--dim); background: transparent; color: var(--dim2); cursor: pointer; transition: color 0.1s, border-color 0.1s, background 0.1s; white-space: nowrap; border-radius: 0; }
.btn:hover { color: var(--text); border-color: var(--dim2); }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.primary:hover { background: var(--accent); color: #111; }
.btn.danger { color: var(--danger); border-color: var(--danger); }
.btn.danger:hover { background: var(--danger); color: #ddd; }
.btn.ok { color: var(--ok-text); border-color: var(--ok); }
.btn.ok:hover { background: var(--ok); color: #ddd; }
.btn:disabled { opacity: 0.2; cursor: not-allowed; }
.btn:disabled:hover { background: transparent; color: var(--dim2); border-color: var(--dim); }
.sep { width: 1px; height: 14px; background: var(--dim); margin: 0 2px; }
#search-bar { padding: 4px 14px; background: var(--surface); border-bottom: 1px solid var(--border2); display: none; align-items: center; gap: 7px; }
#search-bar.visible { display: flex; }
#search-input { flex: 1; max-width: 280px; background: var(--bg); border: 1px solid var(--border2); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 7px; outline: none; border-radius: 0; }
#search-input:focus { border-color: var(--accent); }
#search-col { background: var(--bg); border: 1px solid var(--border2); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 5px; outline: none; cursor: pointer; border-radius: 0; }
#search-count { font-size: 10px; color: var(--dim2); }
#drop-zone { border: 1px dashed var(--dim); margin: 28px; padding: 52px 28px; text-align: center; cursor: pointer; transition: border-color 0.12s; }
#drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); }
#drop-zone h2 { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
#drop-zone p { color: var(--dim2); font-size: 10px; margin-bottom: 18px; line-height: 1.6; }
#drop-zone input[type=file] { display: none; }
#status-bar { padding: 3px 14px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 10px; color: var(--dim2); display: flex; gap: 14px; align-items: center; }
.filetag { color: var(--accent); }
#autosave-indicator { margin-left: auto; display: flex; align-items: center; gap: 4px; }
#autosave-indicator .dot { width: 4px; height: 4px; background: var(--ok-text); }
#grid-container { flex: 1; overflow: auto; }
table { border-collapse: collapse; width: max-content; min-width: 100%; }
thead th { background: var(--surface); color: var(--dim2); font-size: 10px; font-weight: 500; padding: 5px 7px; border: 1px solid var(--border); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 10; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.07em; }
thead th.corner { position: sticky; left: 0; z-index: 20; background: var(--surface); min-width: 36px; }
tbody tr:hover td { background: #151515; }
tbody tr.hidden-row { display: none; }
tbody tr.search-match td { background: rgba(200,169,110,0.04); }
td { border: 1px solid var(--border); padding: 0; min-width: 190px; max-width: 320px; }
td.row-num { background: var(--surface); color: var(--dim2); font-size: 9px; text-align: right; padding: 0 7px 0 0; position: sticky; left: 0; z-index: 5; min-width: 36px; max-width: 36px; border-right: 1px solid var(--border2); user-select: none; }
td input { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 4px 6px; display: block; }
td input:focus { background: #161616; color: #ddd; }
td.col-1 input { color: #555; }
td input.search-hit { background: rgba(200,169,110,0.12) !important; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); padding: 14px; width: 90%; max-width: 580px; }
.modal h3 { font-size: 10px; font-weight: 600; margin-bottom: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
.modal textarea { width: 100%; height: 180px; background: var(--bg); border: 1px solid var(--border2); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 7px; resize: vertical; border-radius: 0; outline: none; }
.modal textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 5px; margin-top: 8px; justify-content: flex-end; }
#toast { position: fixed; bottom: 14px; right: 14px; background: var(--surface); border: 1px solid var(--border2); color: var(--dim2); font-size: 10px; padding: 6px 12px; z-index: 999; opacity: 0; transition: opacity 0.15s; pointer-events: none; font-family: 'IBM Plex Mono', monospace; }
#toast.show { opacity: 1; }
#toast.err { border-color: var(--danger); color: var(--danger); }
#empty-state { display: block; }
#main-ui { display: none; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <img src="https://i.ibb.co/hRvd10m3/Macrohard-Logo.png" alt="" />
    C3GridEditor
  </div>
  <div class="toolbar" id="main-toolbar" style="display:none">
    <button class="btn" id="btn-undo" onclick="undo()" disabled>undo</button>
    <button class="btn" id="btn-redo" onclick="redo()" disabled>redo</button>
    <div class="sep"></div>
    <button class="btn" onclick="addRow()">+row</button>
    <button class="btn" onclick="addCol()">+col</button>
    <button class="btn danger" onclick="delLastRow()">-row</button>
    <button class="btn danger" onclick="delLastCol()">-col</button>
    <div class="sep"></div>
    <button class="btn" onclick="toggleSearch()">search</button>
    <div class="sep"></div>
    <button class="btn ok" onclick="openExport()">export</button>
    <button class="btn ok" onclick="copyJSON()">copy json</button>
    <button class="btn primary" onclick="openImport()">import</button>
    <button class="btn" onclick="downloadJSON()">download</button>
    <div class="sep"></div>
    <button class="btn" onclick="loadNew()">load file</button>
  </div>
</header>
<div id="empty-state">
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <h2>Drop JSON file here</h2>
    <p>Construct 3 C3array format &mdash; Made for My Toxic Darling by Macrohard</p>
    <button class="btn primary" onclick="event.stopPropagation();document.getElementById('file-input').click()">browse file</button>
    &nbsp;
    <button class="btn" onclick="event.stopPropagation();loadDefault()">load demo (elevatorkino)</button>
    <input type="file" id="file-input" accept=".json" onchange="handleFile(this.files[0])"/>
  </div>
</div>
<div id="main-ui">
  <div id="status-bar">
    <span id="file-name" class="filetag">untitled.json</span>
    <span id="dim-label">0r x 0c</span>
    <span style="color:#222">|</span>
    <span>vibecoded by dieclick</span>
    <div id="autosave-indicator"><div class="dot"></div><span id="autosave-label">saved</span></div>
  </div>
  <div id="search-bar">
    <input id="search-input" placeholder="search..." oninput="doSearch()" />
    <select id="search-col" onchange="doSearch()"><option value="-1">all cols</option></select>
    <span id="search-count"></span>
    <button class="btn" onclick="clearSearch()">clear</button>
  </div>
  <div id="grid-container"></div>
</div>
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <h3>Export JSON</h3>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button class="btn ok" onclick="copyFromModal()">copy</button>
      <button class="btn" onclick="closeModal('export-modal')">close</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <h3>Import JSON</h3>
    <textarea id="import-text" placeholder="paste C3array JSON..."></textarea>
    <div class="modal-actions">
      <button class="btn primary" onclick="doImport()">import</button>
      <button class="btn" onclick="closeModal('import-modal')">cancel</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
const DEFAULT_JSON = {"C3array":true,"size":[2,18,1],"data":[[[""],[""],["2"],["3"],["2"],["2"],["2"],["2"],["2"],["2"],["3"],["3"],["3"],["2"],["1"],["1"],["1"],["1"]],[["1=Nibua, 2=cancer, 3=yun"],[""],["Are all the elevators just going up?"],["The exit levels must be infested with gunmen by now. Maybe even locals as well."],["Oh dude...Are we trapped inside now?"],["Where the hell are we even heading?"],["OK, So, let me get things straight"],["You came to kill the same salary we did, right?"],["But, Why did you wanted to kill him for?"],["Why were you searching him?"],["Someone sent me a letter for a heist..."],["But the whole thing was a setup all along"],["I came here to get answers"],["You seem pretty convinced to me though"],["You dont know a damn thing either blue ball"],["We can't let a madman run wide sending these death letters"],["He tried killing me. He ought to pay..."],["And we make sure they always do pay"]]]};
let COL_LABELS=[], grid=[], currentFileName="untitled.json", lastEditedRow=null;
let history=[], historyIndex=-1;
function snapshot(){const s=grid.map(r=>[...r]);history=history.slice(0,historyIndex+1);history.push(s);if(history.length>100)history.shift();historyIndex=history.length-1;updateUndoButtons();}
function undo(){if(historyIndex<=0)return;historyIndex--;grid=history[historyIndex].map(r=>[...r]);renderGrid();updateUndoButtons();toast('undo');}
function redo(){if(historyIndex>=history.length-1)return;historyIndex++;grid=history[historyIndex].map(r=>[...r]);renderGrid();updateUndoButtons();toast('redo');}
function updateUndoButtons(){document.getElementById('btn-undo').disabled=historyIndex<=0;document.getElementById('btn-redo').disabled=historyIndex>=history.length-1;}
const AUTOSAVE_KEY='macrohard_grid_autosave';let autosaveTimer;
function scheduleAutosave(){clearTimeout(autosaveTimer);setAutosaveLabel('...');autosaveTimer=setTimeout(()=>{try{localStorage.setItem(AUTOSAVE_KEY,JSON.stringify({fileName:currentFileName,colLabels:[...COL_LABELS],grid:grid.map(r=>[...r])}));setAutosaveLabel('saved');}catch(e){setAutosaveLabel('fail');}},800);}
function setAutosaveLabel(msg){const el=document.getElementById('autosave-label');if(el)el.textContent=msg;}
function loadAutosave(){try{const raw=localStorage.getItem(AUTOSAVE_KEY);if(!raw)return false;const data=JSON.parse(raw);if(!data.grid||!data.grid.length)return false;if(!confirm('Autosave found for "' +(data.fileName||'unknown')+'". Restore?'))return false;currentFileName=data.fileName||'untitled.json';COL_LABELS=data.colLabels?[...data.colLabels]:[];grid=data.grid.map(r=>[...r]);showUI();renderGrid();snapshot();return true;}catch(e){return false;}}
function loadDefault(){currentFileName="elevatorkino_EN.json";loadFromParsed(DEFAULT_JSON);}
function handleFile(file){if(!file)return;currentFileName=file.name;const reader=new FileReader();reader.onload=e=>{try{loadFromParsed(JSON.parse(e.target.result));}catch(err){toast('invalid json',true);}};reader.readAsText(file);}
function loadFromParsed(parsed){if(!parsed.C3array||!parsed.data){toast('not a valid C3array',true);return;}const numCols=parsed.data.length,numRows=parsed.data[0].length;COL_LABELS=[];for(let c=0;c<numCols;c++){const first=parsed.data[c][0]?(parsed.data[c][0][0]!==undefined?String(parsed.data[c][0][0]):''):'';COL_LABELS.push(first||'col'+c);}grid=[];for(let r=0;r<numRows;r++){grid[r]=[];for(let c=0;c<numCols;c++){const v=parsed.data[c][r][0];grid[r][c]=v!==undefined&&v!==null?String(v):"";}}history=[];historyIndex=-1;snapshot();showUI();renderGrid();updateSearchColSelect();}
function showUI(){document.getElementById('empty-state').style.display='none';document.getElementById('main-ui').style.cssText='display:flex;flex-direction:column;flex:1';document.getElementById('main-toolbar').style.display='flex';document.getElementById('file-name').textContent=currentFileName;}
function loadNew(){COL_LABELS=[];grid=[];history=[];historyIndex=-1;lastEditedRow=null;document.getElementById('empty-state').style.display='block';document.getElementById('main-ui').style.display='none';document.getElementById('main-toolbar').style.display='none';clearSearch();}
function renderGrid(){const numRows=grid.length,numCols=grid[0]?grid[0].length:0;document.getElementById('dim-label').textContent=numRows+'r x '+numCols+'c';let html='<table><thead><tr><th class="corner"></th>';for(let c=0;c<numCols;c++)html+='<th>'+(COL_LABELS[c]||'col'+c)+'</th>';html+='</tr></thead><tbody>';for(let r=0;r<numRows;r++){html+='<tr data-row="'+r+'"><td class="row-num">'+r+'</td>';for(let c=0;c<numCols;c++){const val=(grid[r][c]||"").replace(/"/g,'&quot;').replace(/</g,'&lt;');html+='<td class="col-'+c+'"><input value="'+val+'" data-r="'+r+'" data-c="'+c+'" /></td>';}html+='</tr>';}html+='</tbody></table>';const gc=document.getElementById('grid-container');gc.innerHTML=html;
gc.addEventListener('input',e=>{if(e.target.tagName!=='INPUT')return;const r=+e.target.dataset.r,c=+e.target.dataset.c;lastEditedRow=r;grid[r][c]=e.target.value;if(c===0){const len=e.target.value.length;e.target.style.background=len>280?'rgba(170,51,51,0.2)':len>200?'rgba(200,169,110,0.1)':'';}scheduleAutosave();clearTimeout(gc._snapTimer);gc._snapTimer=setTimeout(snapshot,600);if(document.getElementById('search-input').value)doSearch();});
gc.addEventListener('keydown',e=>{if(e.target.tagName!=='INPUT')return;const r=+e.target.dataset.r,c=+e.target.dataset.c;let nr=r,nc=c;if(e.key==='ArrowDown'||(e.key==='Enter'&&!e.shiftKey))nr=r+1;else if(e.key==='ArrowUp'||(e.key==='Enter'&&e.shiftKey))nr=r-1;else if(e.key==='ArrowRight'&&e.target.selectionEnd===e.target.value.length)nc=c+1;else if(e.key==='ArrowLeft'&&e.target.selectionStart===0)nc=c-1;else if(e.key==='Tab'){e.preventDefault();nc=e.shiftKey?c-1:c+1;if(nc<0){nc=grid[0].length-1;nr=r-1;}else if(nc>=grid[0].length){nc=0;nr=r+1;}}else return;const next=gc.querySelector('input[data-r="'+nr+'"][data-c="'+nc+'"]');if(next){e.preventDefault();next.focus();next.select();}});
gc.querySelectorAll('td.col-0 input').forEach(inp=>{const len=inp.value.length;if(len>280)inp.style.background='rgba(170,51,51,0.2)';else if(len>200)inp.style.background='rgba(200,169,110,0.1)';});
if(document.getElementById('search-input').value)doSearch();scheduleAutosave();}
function toggleSearch(){const bar=document.getElementById('search-bar');const visible=bar.classList.toggle('visible');if(visible)document.getElementById('search-input').focus();else clearSearch();}
function updateSearchColSelect(){const sel=document.getElementById('search-col');sel.innerHTML='<option value="-1">all cols</option>';COL_LABELS.forEach((l,i)=>{const o=document.createElement('option');o.value=i;o.textContent=l;sel.appendChild(o);});}
function doSearch(){const q=document.getElementById('search-input').value.trim().toLowerCase();const cf=+document.getElementById('search-col').value;const rows=document.querySelectorAll('#grid-container tbody tr');let n=0;document.querySelectorAll('#grid-container input.search-hit').forEach(el=>el.classList.remove('search-hit'));rows.forEach(tr=>tr.classList.remove('search-match','hidden-row'));if(!q){document.getElementById('search-count').textContent='';return;}rows.forEach(tr=>{let hit=false;tr.querySelectorAll('input').forEach(inp=>{if(cf!==-1&&+inp.dataset.c!==cf)return;if(inp.value.toLowerCase().includes(q)){inp.classList.add('search-hit');hit=true;}});if(hit){tr.classList.add('search-match');n++;}else tr.classList.add('hidden-row');});document.getElementById('search-count').textContent=n?n+(n>1?' matches':' match'):'none';}
function clearSearch(){document.getElementById('search-input').value='';document.getElementById('search-count').textContent='';document.querySelectorAll('#grid-container tbody tr').forEach(tr=>tr.classList.remove('search-match','hidden-row'));document.querySelectorAll('#grid-container input.search-hit').forEach(el=>el.classList.remove('search-hit'));}
function addRow(){const cols=grid[0]?grid[0].length:COL_LABELS.length;const at=lastEditedRow!==null?lastEditedRow+1:grid.length;grid.splice(at,0,Array(cols).fill(""));snapshot();renderGrid();toast('+row at '+at);}
function addCol(){const name=prompt('column name:','col'+(grid[0]?grid[0].length:COL_LABELS.length));if(name===null)return;COL_LABELS.push(name||'col'+COL_LABELS.length);for(let r=0;r<grid.length;r++)grid[r].push("");snapshot();renderGrid();updateSearchColSelect();toast('+col');}
function delLastRow(){if(grid.length>1){grid.pop();if(lastEditedRow>=grid.length)lastEditedRow=grid.length-1;snapshot();renderGrid();toast('row removed');}}
function delLastCol(){if(grid[0]&&grid[0].length>1){COL_LABELS.pop();for(let r=0;r<grid.length;r++)grid[r].pop();snapshot();renderGrid();updateSearchColSelect();toast('col removed');}}
function buildJSON(){const nr=grid.length,nc=grid[0].length,data=[];for(let c=0;c<nc;c++){const col=[];for(let r=0;r<nr;r++)col.push([grid[r][c]]);data.push(col);}return JSON.stringify({"C3array":true,"size":[nc,nr,1],"data":data},null,2);}
function openExport(){document.getElementById('export-text').value=buildJSON();document.getElementById('export-modal').classList.add('open');}
function openImport(){document.getElementById('import-text').value='';document.getElementById('import-modal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function doImport(){try{loadFromParsed(JSON.parse(document.getElementById('import-text').value));closeModal('import-modal');toast('imported');}catch(e){toast('parse error',true);}}
function copyJSON(){navigator.clipboard.writeText(buildJSON()).then(()=>toast('copied')).catch(()=>{openExport();});}
function copyFromModal(){const t=document.getElementById('export-text');navigator.clipboard.writeText(t.value).then(()=>toast('copied')).catch(()=>{t.select();document.execCommand('copy');toast('copied');});}
function downloadJSON(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([buildJSON()],{type:'application/json'}));a.download=currentFileName||'array.json';a.click();toast('downloaded');}
let toastTimer;
function toast(msg,err=false){const el=document.getElementById('toast');el.textContent=msg;el.className=err?'show err':'show';clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1800);}
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='TEXTAREA')return;if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}else if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}else if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();toggleSearch();}});
window.addEventListener('DOMContentLoaded',()=>{loadAutosave();});
</script>
</body>
</html>
